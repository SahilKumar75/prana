# ── Server ─────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (Supabase PostgreSQL) ─────────────────────────────────────────────
# Get this from: Supabase Dashboard → Project Settings → Database → Connection string (URI)
# Format: jdbc:postgresql://db.<ref>.supabase.co:5432/postgres
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ────────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate = check schema matches entities (safe for production)
# update  = auto-update schema (ok for dev)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JSONB support ───────────────────────────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Groq API ───────────────────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY}

# ── CORS ───────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── Actuator (optional health checks) ─────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
